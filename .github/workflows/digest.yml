name: weekly-digest

on:
  schedule:
    - cron: '0 23 * * 0'   # 毎週日曜 23:00 UTC = 月曜 08:00 JST
  workflow_dispatch:         # 手動実行も可

jobs:
  run:
    runs-on: ubuntu-latest
    permissions:
      contents: write        # seen.json をコミットして戻すために必要

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run digest
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          SMTP_HOST: ${{ secrets.SMTP_HOST }}
          SMTP_PORT: ${{ secrets.SMTP_PORT }}
          SMTP_USER: ${{ secrets.SMTP_USER }}
          SMTP_PASS: ${{ secrets.SMTP_PASS }}
          EMAIL_TO: ${{ secrets.EMAIL_TO }}
          EMAIL_FROM: ${{ secrets.EMAIL_FROM }}
        run: python digest.py

      - name: Commit seen.json
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          # digest.py が書いた seen.json を退避してから pull し、マージして push
          cp seen.json /tmp/seen_current.json
          git pull --rebase origin main
          python3 - <<'EOF'
import json
with open("seen.json") as f:
    remote_ids = set(json.load(f).get("ids", []))
with open("/tmp/seen_current.json") as f:
    current_ids = set(json.load(f).get("ids", []))
merged = list(remote_ids | current_ids)[-2000:]
with open("seen.json", "w") as f:
    json.dump({"ids": merged}, f, ensure_ascii=False, indent=0)
EOF
          git add seen.json
          git diff --cached --quiet || git commit -m "chore: update seen.json [skip ci]"
          git push origin main
